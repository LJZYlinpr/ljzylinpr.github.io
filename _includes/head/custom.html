{% include base_path %}

<!-- start custom head snippets -->

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"/>

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>
<style>
  html,
  body {
    background: #ffffff;
    font-family: "Manrope", "Segoe UI", sans-serif;
  }

  #site-network-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background:
      radial-gradient(circle at 16% 20%, rgba(201, 134, 26, 0.06), transparent 22%),
      radial-gradient(circle at 82% 14%, rgba(15, 118, 110, 0.06), transparent 24%),
      linear-gradient(180deg, #ffffff 0%, #f9fbfb 100%);
  }

  #site-network-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .site-network-note {
    position: absolute;
    right: clamp(16px, 2vw, 28px);
    bottom: clamp(14px, 2vw, 24px);
    display: grid;
    gap: 0.2rem;
    max-width: min(320px, calc(100vw - 32px));
    padding: 0.8rem 0.95rem;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.68);
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.05);
    backdrop-filter: blur(10px);
    color: #475569;
  }

  .site-network-note strong {
    color: #0f766e;
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .site-network-note span {
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .masthead,
  .initial-content,
  .page__footer {
    position: relative;
    z-index: 1;
  }

  .masthead {
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(12px);
  }

  .page__content h1,
  .page__content h2,
  .page__content h3,
  .page__content h4,
  .page__content h5,
  .page__content h6 {
    font-family: "Cormorant Garamond", Georgia, serif;
  }

  @media (max-width: 640px) {
    .site-network-note {
      max-width: calc(100vw - 24px);
      padding: 0.7rem 0.8rem;
      border-radius: 14px;
    }
  }
</style>

<!-- end custom head snippets -->
