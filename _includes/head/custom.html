<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>
<style>
  html,
  body {
    background: #050816;
    font-family: "Manrope", "Segoe UI", sans-serif;
    color: #e2e8f0;
  }

  #site-network-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 18%, rgba(34, 211, 238, 0.08), transparent 24%),
      radial-gradient(circle at 82% 20%, rgba(99, 102, 241, 0.12), transparent 28%),
      radial-gradient(circle at 50% 70%, rgba(14, 165, 233, 0.05), transparent 34%),
      linear-gradient(180deg, #040714 0%, #07111f 52%, #03060d 100%);
  }

  #site-network-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .site-network-note {
    position: absolute;
    right: clamp(16px, 2vw, 28px);
    bottom: clamp(14px, 2vw, 24px);
    display: grid;
    gap: 0.2rem;
    max-width: min(320px, calc(100vw - 32px));
    padding: 0.8rem 0.95rem;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 18px;
    background: rgba(7, 14, 25, 0.7);
    box-shadow: 0 18px 40px rgba(2, 6, 23, 0.36);
    backdrop-filter: blur(10px);
    color: #cbd5e1;
  }

  .site-network-note strong {
    color: #67e8f9;
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .site-network-note span {
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .masthead,
  .initial-content,
  .page__footer {
    position: relative;
    z-index: 1;
  }

  .masthead {
    background: rgba(3, 8, 18, 0.74);
    backdrop-filter: blur(12px);
  }

  .greedy-nav,
  .greedy-nav a,
  .greedy-nav .site-title,
  .masthead__menu-item a,
  #theme-toggle a,
  #theme-icon {
    color: #e2e8f0 !important;
  }

  .greedy-nav {
    background: transparent;
  }

  .greedy-nav a:hover,
  .masthead__menu-item a:hover,
  #theme-toggle a:hover,
  .page__content a:hover,
  .page__footer a:hover,
  .author__urls a:hover {
    color: #67e8f9 !important;
  }

  .page,
  .page__content,
  .archive,
  .archive__item,
  .archive__subtitle,
  .page__title,
  .page__lead,
  .page__content p,
  .page__content li,
  .page__content td,
  .page__content th,
  .page__content blockquote,
  .page__content .small,
  .archive p,
  .archive li {
    color: #d7e3f1;
  }

  .page__title,
  .archive__subtitle,
  .page__content h1,
  .page__content h2,
  .page__content h3,
  .page__content h4,
  .page__content h5,
  .page__content h6 {
    color: #f8fafc;
  }

  .page__content a,
  .archive a,
  .page__footer a,
  .author__urls a,
  .author__urls li,
  .social-icons a {
    color: #9bdcf5;
  }

  .archive {
    padding: 0.5rem 0 2rem;
  }

  .archive .page__title {
    margin-bottom: 1rem;
  }

  .sidebar {
    color: #d7e3f1;
  }

  .author__avatar img,
  .author__avatar {
    border-radius: 32px;
  }

  .author__content,
  .author__urls-wrapper,
  .author__urls {
    color: #d7e3f1;
  }

  .author__name,
  .author__content h3 {
    color: #f8fafc;
  }

  .author__bio,
  .author__urls li,
  .author__urls .author__desktop {
    color: #bfd0e4;
  }

  .author__urls-wrapper .btn,
  .btn,
  .btn--inverse {
    border-color: rgba(148, 163, 184, 0.2);
    background: rgba(11, 19, 34, 0.88);
    color: #e2e8f0;
  }

  .page__footer {
    background: rgba(3, 8, 18, 0.72);
    color: #bfd0e4;
    backdrop-filter: blur(12px);
  }

  .page__footer-copyright,
  .page__footer-follow,
  .page__footer-follow strong,
  .page__footer .social-icons li,
  .page__footer .social-icons a {
    color: #bfd0e4;
  }

  .page__footer-follow strong {
    color: #f8fafc;
  }

  .page__content h1,
  .page__content h2,
  .page__content h3,
  .page__content h4,
  .page__content h5,
  .page__content h6 {
    font-family: "Cormorant Garamond", Georgia, serif;
  }

  .page__content .info-page-shell {
    width: min(1180px, calc(100vw - 2rem));
    margin: 0 auto 2rem;
    min-height: 68vh;
    color: #e2e8f0;
  }

  .page__content .info-page-intro {
    margin-bottom: 1.25rem;
    padding: 1.5rem 1.6rem;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 28px;
    background: rgba(7, 14, 25, 0.92);
    box-shadow: 0 28px 70px rgba(2, 6, 23, 0.38);
    backdrop-filter: blur(12px);
  }

  .page__content .info-page-intro p {
    margin: 0.7rem 0 0;
    color: #bfd0e4;
    line-height: 1.8;
  }

  .page__content .info-page-grid {
    display: grid;
    gap: 1.1rem;
  }

  .page__content .info-card {
    padding: 1.5rem 1.6rem;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 28px;
    background: rgba(7, 14, 25, 0.92);
    box-shadow: 0 28px 70px rgba(2, 6, 23, 0.38);
    backdrop-filter: blur(12px);
  }

  .page__content .info-card__eyebrow {
    display: inline-block;
    margin-bottom: 0.45rem;
    color: #67e8f9;
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .page__content .info-card h2,
  .page__content .info-card h3 {
    margin: 0;
    padding: 0;
    border: 0;
    color: #f8fafc;
  }

  .page__content .info-card p {
    margin: 0.85rem 0 0;
    color: #bfd0e4;
    line-height: 1.85;
  }

  .page__content .info-card__meta {
    margin-top: 1rem;
    color: #67e8f9;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    .page__content .info-page-shell {
      width: min(100vw - 1rem, 100%);
      min-height: 62vh;
    }

    .page__content .info-page-intro,
    .page__content .info-card {
      padding: 1.2rem;
      border-radius: 22px;
    }
  }

  @media (max-width: 640px) {
    .site-network-note {
      max-width: calc(100vw - 24px);
      padding: 0.7rem 0.8rem;
      border-radius: 14px;
    }
  }
</style>

<!-- end custom head snippets -->
